services:
  # ==================== DATABASES ====================
  mysql_db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: customer_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-mysql.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - microservices-net
    healthcheck:
      test:
        ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -proot || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s

  postgres_db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ==================== SERVICES ====================
  customer-service:
    build: ./customer-service
    container_name: customer-service
    restart: always
    ports:
      - "8001:8000"
    environment:
      DB_HOST: mysql_db
      DB_PORT: 3306
      DB_NAME: customer_db
      DB_USER: root
      DB_PASSWORD: root
      PRODUCT_SERVICE_MAP: laptop:laptops:http://laptop-service:8000,mobile:mobiles:http://mobile-service:8000,tablet:tablets:http://tablet-service:8000,accessory:accessories:http://accessory-service:8000,smartwatch:smartwatches:http://smartwatch-service:8000,monitor:monitors:http://monitor-service:8000
    depends_on:
      mysql_db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', 8000)); s.close()",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s
    networks:
      - microservices-net

  staff-service:
    build: ./staff-service
    container_name: staff-service
    restart: always
    ports:
      - "8002:8000"
    environment:
      DB_HOST: mysql_db
      DB_PORT: 3306
      DB_NAME: staff_db
      DB_USER: root
      DB_PASSWORD: root
      PRODUCT_SERVICE_MAP: laptop:laptops:http://laptop-service:8000,mobile:mobiles:http://mobile-service:8000,tablet:tablets:http://tablet-service:8000,accessory:accessories:http://accessory-service:8000,smartwatch:smartwatches:http://smartwatch-service:8000,monitor:monitors:http://monitor-service:8000
    depends_on:
      mysql_db:
        condition: service_healthy
    networks:
      - microservices-net

  laptop-service:
    build: ./laptop-service
    container_name: laptop-service
    restart: always
    ports:
      - "8003:8000"
    environment:
      DB_HOST: postgres_db
      DB_PORT: 5432
      DB_NAME: laptop_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres_db:
        condition: service_healthy
    networks:
      - microservices-net

  mobile-service:
    build: ./mobile-service
    container_name: mobile-service
    restart: always
    ports:
      - "8004:8000"
    environment:
      DB_HOST: postgres_db
      DB_PORT: 5432
      DB_NAME: mobile_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres_db:
        condition: service_healthy
    networks:
      - microservices-net

  tablet-service:
    build: ./tablet-service
    container_name: tablet-service
    restart: always
    ports:
      - "8007:8000"
    environment:
      DB_HOST: postgres_db
      DB_PORT: 5432
      DB_NAME: tablet_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres_db:
        condition: service_healthy
    networks:
      - microservices-net

  accessory-service:
    build: ./accessory-service
    container_name: accessory-service
    restart: always
    ports:
      - "8008:8000"
    environment:
      DB_HOST: postgres_db
      DB_PORT: 5432
      DB_NAME: accessory_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres_db:
        condition: service_healthy
    networks:
      - microservices-net

  smartwatch-service:
    build: ./smartwatch-service
    container_name: smartwatch-service
    restart: always
    ports:
      - "8009:8000"
    environment:
      DB_HOST: postgres_db
      DB_PORT: 5432
      DB_NAME: smartwatch_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres_db:
        condition: service_healthy
    networks:
      - microservices-net

  monitor-service:
    build: ./monitor-service
    container_name: monitor-service
    restart: always
    ports:
      - "8010:8000"
    environment:
      DB_HOST: postgres_db
      DB_PORT: 5432
      DB_NAME: monitor_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres_db:
        condition: service_healthy
    networks:
      - microservices-net

  # ==================== API GATEWAY ====================
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    restart: always
    ports:
      - "8000:8000"
    environment:
      CUSTOMER_SERVICE_URL: http://customer-service:8000
      STAFF_SERVICE_URL: http://staff-service:8000
      GATEWAY_SERVICE_MAP: customers:http://customer-service:8000,staff:http://staff-service:8000,laptops:http://laptop-service:8000,mobiles:http://mobile-service:8000,tablets:http://tablet-service:8000,accessories:http://accessory-service:8000,smartwatches:http://smartwatch-service:8000,monitors:http://monitor-service:8000
    depends_on:
      customer-service:
        condition: service_healthy
      staff-service:
        condition: service_started
      laptop-service:
        condition: service_started
      mobile-service:
        condition: service_started
      tablet-service:
        condition: service_started
      accessory-service:
        condition: service_started
      smartwatch-service:
        condition: service_started
      monitor-service:
        condition: service_started
    networks:
      - microservices-net

  # ==================== CHATBOT (Ignored for now) ====================
  techshop-web:
    build: ./techshop/web
    container_name: django_techshop
    ports:
      - "8005:8000"
    environment:
      - DB_NAME=techshop_db
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_HOST=mysql_db
      - DB_PORT=3306
    depends_on:
      mysql_db:
        condition: service_healthy
    networks:
      - microservices-net

  ai-service:
    build: ./techshop/ai_service
    container_name: ai-service
    restart: always
    ports:
      - "8006:8000"
    environment:
      AI_SAFE_SIMILARITY_THRESHOLD: "0.5"
    volumes:
      - chroma_data:/app/chroma_db
      - model_data:/app/saved_model
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 60s
    networks:
      - microservices-net

volumes:
  mysql_data:
  postgres_data:
  chroma_data:
  model_data:

networks:
  microservices-net:
    driver: bridge
